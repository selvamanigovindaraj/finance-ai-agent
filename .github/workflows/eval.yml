name: Eval

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category filter (leave blank for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - budgeting
          - expense_categorisation
          - stock_quote
          - financial_literacy
          - pii_detection
          - prompt_injection
      max_examples:
        description: "Max examples (leave blank for all)"
        required: false
        default: ""
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC nightly on main

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Download spaCy model
        run: uv run python -m spacy download en_core_web_lg --quiet

      - name: Run eval
        run: |
          ARGS="--eval-only"
          [ -n "${{ inputs.category }}" ] && ARGS="$ARGS --category ${{ inputs.category }}"
          [ -n "${{ inputs.max_examples }}" ] && ARGS="$ARGS --max-examples ${{ inputs.max_examples }}"
          uv run python scripts/eval.py $ARGS
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_ENDPOINT: ${{ secrets.DEEPSEEK_ENDPOINT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
